name: CI

on:
  pull_request:
    paths:
      - "Casks/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "Casks/**"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Stage workspace as tap
        run: |
          tap_short="${GITHUB_REPOSITORY#*/homebrew-}"
          owner=$(echo "${GITHUB_REPOSITORY%/*}" | tr '[:upper:]' '[:lower:]')
          target="$(brew --repo)/Library/Taps/${owner}/homebrew-${tap_short}"
          rm -rf "$target"
          mkdir -p "$(dirname "$target")"
          ln -s "$GITHUB_WORKSPACE" "$target"
          echo "TAP=${owner}/${tap_short}" >> "$GITHUB_ENV"

      - name: brew style
        run: brew style "$TAP"

      - name: brew audit
        run: |
          shopt -s nullglob
          for cask_file in Casks/*.rb; do
            name=$(basename "$cask_file" .rb)
            echo "::group::audit $TAP/$name"
            brew audit --strict --online --cask "$TAP/$name"
            echo "::endgroup::"
          done
