name: Auto-bump casks

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours at 00:00, 06:00, 12:00, and 18:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: Homebrew/actions/setup-homebrew@main

      - name: Configure git identity
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Stage workspace as tap
        run: |
          tap_short="${GITHUB_REPOSITORY#*/homebrew-}"
          owner=$(echo "${GITHUB_REPOSITORY%/*}" | tr '[:upper:]' '[:lower:]')
          target="$(brew --repo)/Library/Taps/${owner}/homebrew-${tap_short}"
          rm -rf "$target"
          mkdir -p "$(dirname "$target")"
          ln -s "$GITHUB_WORKSPACE" "$target"
          echo "TAP=${owner}/${tap_short}" >> "$GITHUB_ENV"

      - name: Remove stale bump branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          for cask_file in Casks/*.rb; do
            name=$(basename "$cask_file" .rb)
            prefix="bump-${name}-"

            while read -r branch; do
              [[ -n "$branch" ]] || continue

              open_prs=$(gh pr list \
                --repo "${{ github.repository }}" \
                --state open \
                --head "$branch" \
                --json number \
                --jq 'length')

              if [[ "$open_prs" != "0" ]]; then
                echo "Keeping $branch because it still has an open PR"
                continue
              fi

              echo "Deleting stale remote branch $branch"
              git push origin --delete "$branch" || true
            done < <(
              gh api \
                --paginate \
                "repos/${{ github.repository }}/branches?per_page=100" \
                --jq ".[] | select(.name | startswith(\"${prefix}\")) | .name"
            )
          done

      - name: Run brew bump for every cask
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN:                 ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          for cask_file in Casks/*.rb; do
            name=$(basename "$cask_file" .rb)
            full="${TAP}/${name}"
            echo "::group::bump ${full}"
            # `brew bump` runs livecheck, determines the new version, and then
            # calls `brew bump-cask-pr` with explicit version arguments.
            brew bump --cask --open-pr --no-fork "$full"
            echo "::endgroup::"
          done

      - name: Enable auto-merge on any open bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,headRefName \
            | jq -r '.[] | select(.headRefName | startswith("bump-")) | .number' \
            | while read -r pr; do
                echo "Enabling auto-merge on PR #$pr"
                gh pr merge --auto --squash --repo "${{ github.repository }}" "$pr" || true
              done
